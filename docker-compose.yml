version: "3.8"

services:
  # ============ 后端服务 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-qa-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - RETRIEVAL_TOP_K=${RETRIEVAL_TOP_K:-3}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.5}
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ 前端服务 ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-qa-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ============ Ollama 本地模型服务（可选）============
  ollama:
    image: ollama/ollama:latest
    container_name: ai-qa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Windows 下需要使用 host 网络模式以访问 GPU
    # network_mode: host

volumes:
  ollama_data:

# 网络模式说明：
# Windows Docker Desktop: 去掉 network_mode，使用端口映射
# Linux/macOS: 可用 network_mode: host 获得更好性能
